name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: pytest (mock suite, no Vina)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docking]"
          # The mock test suite never needs AutoDock Vina or OpenBabel; it
          # exercises the offline CI path (mode: ci) and the RDKit fallback.

      - name: Run pytest
        run: python -m pytest test_pipeline.py -q
