# AutoAntibiotic Discovery Pipeline — Configuration
# -----------------------------------------------------------------------------
# mode: "ci"      -> CI / mock mode. Redocking validation is skipped and no
#                    physical RMSD is computed/trusted. Use for offline test runs.
# mode: "science" -> Real scientific validation. Expects real PDBs and runs
#                    the full redocking protocol. This is the default when this
#                    file is missing.
#
# The mode may also be overridden via an environment variable:
#   AUTOANTIBIOTIC_MODE=ci|science   (explicit, highest precedence)
# -----------------------------------------------------------------------------

mode: science

# Native ligand override (optional)
# -----------------------------------------------------------------------------
# When redocking validation extracts the native ligand from the holo PDB, it
# normally auto-detects the largest non-buffer hetero-residue. In complex
# structures this can pick the wrong molecule. Set this to the exact ligand
# residue name (case-insensitive) to force selection, e.g.:
#
# native_ligand_resname: CEF
#
# Uncomment and set as needed; leave absent for automatic detection.
# native_ligand_resname: CEF
