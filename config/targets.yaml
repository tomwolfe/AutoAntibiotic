# AutoAntibiotic Discovery Pipeline — Target-specific configuration
# -----------------------------------------------------------------------------
# Residue lists used to build docking grid boxes and for scientific
# cross-checks. These were previously hardcoded in ``config/constants.py``.
#
# Editing this file lets you re-target the pipeline (or adjust the known
# catalytic/active-site residues) without touching the source code.
#
# If this file is missing or cannot be parsed, ``config/constants.py`` falls
# back to the original hardcoded defaults, so the pipeline keeps working.
# -----------------------------------------------------------------------------

targets:
  ALLOSTERIC_RESIDUES: ["TYR105", "GLN199", "GLU237"]
  ACTIVE_SITE_RESIDUES: ["SER403"]
  CONSERVED_RESIDUES: ["SER403", "LYS406", "TYR446"]
  TRYPSIN_CATALYTIC_RESIDUES: ["HIS57", "ASP102", "SER195"]
  CES1_CATALYTIC_RESIDUES: ["SER221", "HIS468", "GLU354"]
  # Human off-target panel (added for a wider selectivity screen). Residue
  # lists are plausible catalytic/active-site sites used to centre the docking
  # grid. Edit here to re-target without touching source code.
  ALBUMIN_CATALYTIC_RESIDUES: ["HIS242", "LYS199"]
  CYP3A4_CATALYTIC_RESIDUES: ["HIS368", "ARG105"]
  # Additional (optional / mock-capable) off-target panel entries used to widen
  # the selectivity screen further. HERG (cardiotoxicity) and CYP2D6 (metabolic
  # liability) are appended when a prepared receptor + grid centre exist; they
  # skip gracefully if no real PDB is available (CI/offline). Sane defaults:
  HERG_CATALYTIC_RESIDUES: ["SER624", "TYR652", "PHE656"]
  CYP2D6_CATALYTIC_RESIDUES: ["ASP301", "GLU216", "SER304"]

# ── Selectivity panel split (Task 1) ───────────────────────────────────────
# The human off-target panel is split into two groups with distinct scientific
# roles (see CHANGELOG / paper §Methods):
#
#   SELECTIVITY_PANEL_TARGETS — mechanistically relevant human serine hydrolases
#     (Trypsin, CES1). These have narrow, sterically gated catalytic sites that
#     the seed library was explicitly designed to avoid. The PRIMARY Selectivity
#     Index (SI) uses ONLY this panel as its denominator, so it measures the
#     property the design intent actually targets.
#
#   LIABILITY_PANEL_TARGETS — promiscuous sinks (CYP3A4, albumin, hERG, CYP2D6)
#     that bind any aromatic acid at -9 to -10.5 kcal/mol. They MUST NEVER enter
#     the SI denominator; they feed the Off_Target_Risk flag and are reported as
#     their own energy columns.
#
# The OLD pan-panel SI (all human off-targets in the denominator) is preserved as
# a separate column (Selectivity_Index_PanPanel) for full transparency.
selectivity:
  SELECTIVITY_PANEL_TARGETS: ["trypsin", "CES1"]
  LIABILITY_PANEL_TARGETS: ["cyp3a4", "albumin", "herg", "cyp2d6"]
  # Ceftaroline control active-site energy (kcal/mol) used for the supplementary
  # transparency metric SI_vs_Ceftaroline = |E_PBP2a_best| / CEFTAROLINE_CONTROL_E.
  CEFTAROLINE_CONTROL_E: 7.3

# ── Mutation scan (reduced-resistance probability) ──────────────────────────
# When true, top candidates are redocked against PBP2a mutant receptors
# (S403A, K406A, Y446A) built by mutating the apo PDBQT. The energy delta vs
# the wild-type pose is recorded quantitatively (mutant_energy_delta) and folded
# into the resistance notes. Disable to skip the extra docking calls.
mutation_scan: true

# ── Protocol trust RMSD thresholds (Å) ────────────────────────────────────────
# Redocking RMSD cutoffs used by config.constants.protocol_trust and the
# redocking validation gate. Previously hardcoded (1.5 / 2.0). Sane defaults
# are applied if this block is missing or cannot be parsed.
thresholds:
  # RMSD at or below which the docking protocol is considered "Validated".
  rmsd_validated_max: 1.5
  # RMSD above rmsd_validated_max but at/below this is "Validated (Marginal)".
  # Above this is flagged "CAUTION: High RMSD".
  rmsd_marginal_max: 2.0
