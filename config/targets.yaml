# AutoAntibiotic Discovery Pipeline — Target-specific configuration
# -----------------------------------------------------------------------------
# Primary scope: non-covalent allosteric PBP2a inhibition. The selectivity
# panel targets (trypsin, CES1) are human serine hydrolases with narrow
# catalytic sites; the liability panel (albumin, CYP3A4, hERG, CYP2D6) is
# not docked in this pipeline.
# -----------------------------------------------------------------------------

targets:
  ALLOSTERIC_RESIDUES: ["TYR105", "GLN199", "GLU237"]
  ACTIVE_SITE_RESIDUES: ["SER403"]
  CONSERVED_RESIDUES: ["SER403", "LYS406", "TYR446"]
  TRYPSIN_CATALYTIC_RESIDUES: ["HIS57", "ASP102", "SER195"]
  CES1_CATALYTIC_RESIDUES: ["SER221", "HIS468", "GLU354"]

selectivity:
  SELECTIVITY_PANEL_TARGETS: ["trypsin", "CES1"]
  CEFTAROLINE_CONTROL_E: 7.3

thresholds:
  rmsd_validated_max: 1.5
  rmsd_marginal_max: 2.0

# Data-calibrated SI gate (v4.0). Derived from known-active benchmark
# ROC analysis: see output/enrichment_results.json for the supporting
# enrichment metrics.
si_gate:
  selectivity_index_threshold: 1.5
  si_strong_threshold: 2.0
  si_promising_threshold: 1.0
